<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Scientific Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <div class="main-container">
        <div class="calculator">
            <input type="text" id="display" disabled>
            <div class="buttons">
                <button class="btn sci" onclick="append('Math.sin(')">sin</button>
                <button class="btn sci" onclick="append('Math.cos(')">cos</button>
                <button class="btn sci" onclick="append('Math.tan(')">tan</button>
                <button class="btn sci" onclick="append('Math.log10(')">log</button>
                
                <button class="btn sci" onclick="append('Math.PI')">π</button>
                <button class="btn sci" onclick="append('**')">xʸ</button>
                <button class="btn sci" onclick="append('Math.sqrt(')">√</button>
                <button class="btn delete" onclick="clearDisplay()">AC</button>
                
                <button class="btn" onclick="append('7')">7</button>
                <button class="btn" onclick="append('8')">8</button>
                <button class="btn" onclick="append('9')">9</button>
                <button class="btn op" onclick="append('/')">÷</button>
                
                <button class="btn" onclick="append('4')">4</button>
                <button class="btn" onclick="append('5')">5</button>
                <button class="btn" onclick="append('6')">6</button>
                <button class="btn op" onclick="append('*')">×</button>
                
                <button class="btn" onclick="append('1')">1</button>
                <button class="btn" onclick="append('2')">2</button>
                <button class="btn" onclick="append('3')">3</button>
                <button class="btn op" onclick="append('-')">-</button>
                
                <button class="btn" onclick="append('0')">0</button>
                <button class="btn" onclick="append('.')">.</button>
                <button class="btn equal" onclick="calculate()">=</button>
                <button class="btn op" onclick="append('+')">+</button>
            </div>
        </div>

        <div class="history-card">
            <h3>History</h3>
            <ul id="history-list"></ul>
            <button class="clear-history" onclick="clearHistory()">Clear History</button>
        </div>
    </div>
    <script src="calculator.js"></script>
</body>
</html>
